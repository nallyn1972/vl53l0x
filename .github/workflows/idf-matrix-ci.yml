name: IDF Matrix CI

on:
  push:
  pull_request:

jobs:
  build-test-app:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        idf_version: ["v5.5.4", "v6.0.0"]
    container:
      image: espressif/idf:${{ matrix.idf_version }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build test app against local component
        run: |
          cd examples/esp32_test_app
          idf.py set-target esp32
          idf.py build
